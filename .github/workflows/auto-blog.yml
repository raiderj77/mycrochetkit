name: Daily Auto-Blog Sync

on:
  schedule:
    - cron: "0 10 * * *" # Runs daily at 10:00 AM UTC (1 hour after GAS trigger)
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  import-blog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Create Service Account Key
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}' > scripts/service-account.json

      - name: Run Import Script
        run: npm run blog:import
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}

      - name: Commit and Push Changes
        run: |
          git config --global user.name "MCK Blog Bot"
          git config --global user.email "bot@mycrochetkit.com"
          git add public/blog/ sitemap.xml

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 auto: Sync latest blog posts from Google Drive [skip ci]"
            git push origin main
          fi
