        echo "VITE_FIREBASE_API_KEY=AIzaSyA3pdixOcnqbs7HECuUnCcb1tITIfHSE94" > .env
        echo "VITE_FIREBASE_AUTH_DOMAIN=my-crochetkit.firebaseapp.com" >> .env
        echo "VITE_FIREBASE_PROJECT_ID=my-crochetkit" >> .env
