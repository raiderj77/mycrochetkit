        echo "VITE_FIREBASE_MESSAGING_SENDER_ID=646754548026" >> .env
        echo "VITE_FIREBASE_APP_ID=1:646754548026:web:1aba50399e980570d73803" >> .env
        echo "VITE_FIREBASE_MEASUREMENT_ID=G-23B576BHEZ" >> .env
        echo "VITE_STRIPE_PUBLISHABLE_KEY=pk_test_placeholder" >> .env
        echo "VITE_STRIPE_PRICE_MONTHLY=price_placeholder" >> .env
        echo "VITE_STRIPE_PRICE_YEARLY=price_placeholder" >> .env
